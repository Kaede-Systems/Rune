name: Release Bundles

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rune-release-branch
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runner: windows-latest
            binary: target/release/rune.exe
            suffix: windows-x64.zip
            archive: zip
            host_bundle: windows-x64
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.7/LLVM-21.1.7-win64.exe
          - id: linux-x64
            runner: ubuntu-latest
            binary: target/release/rune
            suffix: linux-x64.tar.gz
            archive: tar
            host_bundle: linux-x64
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.7/LLVM-21.1.7-Linux-X64.tar.xz
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            binary: target/release/rune
            suffix: linux-arm64.tar.gz
            archive: tar
            host_bundle: linux-arm64
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.7/LLVM-21.1.7-Linux-ARM64.tar.xz
          - id: macos-x64
            runner: macos-15-intel
            binary: target/release/rune
            suffix: macos-x64.tar.gz
            archive: tar
            host_bundle: macos-x64
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.7/LLVM-21.1.7-macOS-X64.tar.xz
          - id: macos-arm64
            runner: macos-15
            binary: target/release/rune
            suffix: macos-arm64.tar.gz
            archive: tar
            host_bundle: macos-arm64
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.7/LLVM-21.1.7-macOS-ARM64.tar.xz

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Rune version
        shell: bash
        run: |
          set -eux
          VERSION=$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
print(data["package"]["version"])
PY
)
          echo "RUNE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RUNE_VERSION_TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "LATEST_BUNDLE=rune-latest-${{ matrix.suffix }}" >> "$GITHUB_ENV"
          echo "VERSIONED_BUNDLE=rune-v$VERSION-${{ matrix.suffix }}" >> "$GITHUB_ENV"

      - name: Build Rune
        run: cargo build --release

      - name: Build llvm-cbe (Unix)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -eux
          mkdir -p .toolchain/llvm .toolchain/llvm-cbe-build
          curl -fL "${{ matrix.llvm_url }}" -o .toolchain/llvm.tar.xz
          tar -xf .toolchain/llvm.tar.xz -C .toolchain/llvm
          LLVM_ROOT="$(find .toolchain/llvm -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$LLVM_ROOT"
          cmake -S tools/llvm-cbe -B .toolchain/llvm-cbe-build -DLLVM_DIR="$LLVM_ROOT/lib/cmake/llvm" -DCMAKE_BUILD_TYPE=Release
          cmake --build .toolchain/llvm-cbe-build --config Release --target llvm-cbe -j2

      - name: Build llvm-cbe (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .toolchain\llvm -Force | Out-Null
          $installer = Join-Path (Resolve-Path .toolchain).Path "llvm-installer.exe"
          Invoke-WebRequest -Uri "${{ matrix.llvm_url }}" -OutFile $installer
          $llvmRoot = Join-Path (Resolve-Path .toolchain).Path "llvm\windows-x64"
          Start-Process -FilePath $installer -ArgumentList "/S", "/D=$llvmRoot" -Wait
          cmake -S tools/llvm-cbe -B .toolchain\llvm-cbe-build -G "Visual Studio 17 2022" -A x64 -DLLVM_DIR="$llvmRoot\lib\cmake\llvm"
          cmake --build .toolchain\llvm-cbe-build --config Release --target llvm-cbe

      - name: Stage Unix bundle
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -eux
          mkdir -p bundle/bin bundle/share/rune/tools/llvm-cbe/${{ matrix.host_bundle }}/bin bundle/installers
          cp "${{ matrix.binary }}" bundle/bin/rune
          chmod 755 bundle/bin/rune
          printf '%s\n' "$RUNE_VERSION" > bundle/share/rune/VERSION
          cp -R tools/llvm-cbe bundle/share/rune/tools/llvm-cbe
          cp .toolchain/llvm-cbe-build/tools/llvm-cbe/llvm-cbe bundle/share/rune/tools/llvm-cbe/${{ matrix.host_bundle }}/bin/llvm-cbe
          chmod 755 bundle/share/rune/tools/llvm-cbe/${{ matrix.host_bundle }}/bin/llvm-cbe
          cp installers/install-unix.sh bundle/installers/install-unix.sh
          cp installers/README.md bundle/installers/README.md
          tar -czf "$LATEST_BUNDLE" -C bundle .
          cp "$LATEST_BUNDLE" "$VERSIONED_BUNDLE"

      - name: Stage Windows bundle
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle\bin -Force | Out-Null
          New-Item -ItemType Directory -Path bundle\share\rune\tools\llvm-cbe\${{ matrix.host_bundle }}\bin -Force | Out-Null
          New-Item -ItemType Directory -Path bundle\installers -Force | Out-Null
          Copy-Item "${{ matrix.binary }}" bundle\bin\rune.exe -Force
          Set-Content -Path bundle\share\rune\VERSION -Value $env:RUNE_VERSION -NoNewline
          Copy-Item tools\llvm-cbe bundle\share\rune\tools\llvm-cbe -Recurse -Force
          Copy-Item .toolchain\llvm-cbe-build\tools\llvm-cbe\Release\llvm-cbe.exe bundle\share\rune\tools\llvm-cbe\${{ matrix.host_bundle }}\bin\llvm-cbe.exe -Force
          Copy-Item installers\install-windows.ps1 bundle\installers\install-windows.ps1 -Force
          Copy-Item installers\README.md bundle\installers\README.md -Force
          Compress-Archive -Path bundle\* -DestinationPath $env:LATEST_BUNDLE -Force
          Copy-Item $env:LATEST_BUNDLE $env:VERSIONED_BUNDLE -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}-bundles
          path: |
            rune-latest-${{ matrix.suffix }}
            rune-v*-${{ matrix.suffix }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve Rune version
        shell: bash
        run: |
          set -eux
          VERSION=$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
print(data["package"]["version"])
PY
)
          echo "RUNE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RUNE_VERSION_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Flatten release assets
        shell: bash
        run: |
          set -eux
          mkdir -p flat
          find release-assets -type f -maxdepth 2 -exec cp {} flat/ \;

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eux
          VERSION_TAG="$RUNE_VERSION_TAG"
          VERSION_TITLE="Rune $RUNE_VERSION"
          VERSION_NOTES="Versioned Rune release bundles from the release branch."
          LATEST_TAG="release-branch-latest"
          LATEST_TITLE="Release Branch Latest ($RUNE_VERSION_TAG)"
          LATEST_NOTES="Latest Rune release bundles from the release branch."

          versioned_assets=(flat/rune-v${RUNE_VERSION}-*)
          latest_assets=(flat/rune-latest-*)

          if gh release view "$VERSION_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "${versioned_assets[@]}" --clobber --repo "$GH_REPO"
          else
            gh release create "$VERSION_TAG" "${versioned_assets[@]}" --title "$VERSION_TITLE" --notes "$VERSION_NOTES" --repo "$GH_REPO"
          fi

          if gh release view "$LATEST_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$LATEST_TAG" "${latest_assets[@]}" --clobber --repo "$GH_REPO"
            gh release edit "$LATEST_TAG" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --repo "$GH_REPO"
          else
            gh release create "$LATEST_TAG" "${latest_assets[@]}" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --repo "$GH_REPO"
          fi
