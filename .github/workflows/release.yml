name: Release Bundles

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rune-release-branch
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runner: windows-latest
            binary: target/release/rune.exe
            suffix: windows-x64.zip
            archive: zip
          - id: linux-x64
            runner: ubuntu-latest
            binary: target/release/rune
            suffix: linux-x64.tar.gz
            archive: tar
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            binary: target/release/rune
            suffix: linux-arm64.tar.gz
            archive: tar
          - id: macos-x64
            runner: macos-15-intel
            binary: target/release/rune
            suffix: macos-x64.tar.gz
            archive: tar
          - id: macos-arm64
            runner: macos-15
            binary: target/release/rune
            suffix: macos-arm64.tar.gz
            archive: tar

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Rune version
        shell: bash
        run: |
          set -eux
          VERSION=$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
print(data["package"]["version"])
PY
)
          echo "RUNE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RUNE_VERSION_TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "LATEST_BUNDLE=rune-latest-${{ matrix.suffix }}" >> "$GITHUB_ENV"
          echo "VERSIONED_BUNDLE=rune-v$VERSION-${{ matrix.suffix }}" >> "$GITHUB_ENV"

      - name: Build Rune
        run: cargo build --release

      - name: Stage Unix bundle
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -eux
          mkdir -p bundle/bin bundle/share/rune bundle/installers
          cp "${{ matrix.binary }}" bundle/bin/rune
          chmod 755 bundle/bin/rune
          printf '%s\n' "$RUNE_VERSION" > bundle/share/rune/VERSION
          cp installers/install-unix.sh bundle/installers/install-unix.sh
          cp installers/README.md bundle/installers/README.md
          tar -czf "$LATEST_BUNDLE" -C bundle .
          cp "$LATEST_BUNDLE" "$VERSIONED_BUNDLE"

      - name: Stage Windows bundle
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle\bin -Force | Out-Null
          New-Item -ItemType Directory -Path bundle\share\rune -Force | Out-Null
          New-Item -ItemType Directory -Path bundle\installers -Force | Out-Null
          Copy-Item "${{ matrix.binary }}" bundle\bin\rune.exe -Force
          Set-Content -Path bundle\share\rune\VERSION -Value $env:RUNE_VERSION -NoNewline
          Copy-Item installers\install-windows.ps1 bundle\installers\install-windows.ps1 -Force
          Copy-Item installers\README.md bundle\installers\README.md -Force
          Compress-Archive -Path bundle\* -DestinationPath $env:LATEST_BUNDLE -Force
          Copy-Item $env:LATEST_BUNDLE $env:VERSIONED_BUNDLE -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}-bundles
          path: |
            rune-latest-${{ matrix.suffix }}
            rune-v*-${{ matrix.suffix }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve Rune version
        shell: bash
        run: |
          set -eux
          VERSION=$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
print(data["package"]["version"])
PY
)
          echo "RUNE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RUNE_VERSION_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Flatten release assets
        shell: bash
        run: |
          set -eux
          mkdir -p flat
          find release-assets -type f -maxdepth 2 -exec cp {} flat/ \;

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eux
          VERSION_TAG="$RUNE_VERSION_TAG"
          VERSION_TITLE="Rune $RUNE_VERSION"
          VERSION_NOTES="Versioned Rune release bundles from the release branch."
          LATEST_TAG="release-branch-latest"
          LATEST_TITLE="Release Branch Latest ($RUNE_VERSION_TAG)"
          LATEST_NOTES="Latest Rune release bundles from the release branch."

          versioned_assets=(flat/rune-v${RUNE_VERSION}-*)
          latest_assets=(flat/rune-latest-*)

          if gh release view "$VERSION_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "${versioned_assets[@]}" --clobber --repo "$GH_REPO"
          else
            gh release create "$VERSION_TAG" "${versioned_assets[@]}" --title "$VERSION_TITLE" --notes "$VERSION_NOTES" --repo "$GH_REPO"
          fi

          if gh release view "$LATEST_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$LATEST_TAG" "${latest_assets[@]}" --clobber --repo "$GH_REPO"
            gh release edit "$LATEST_TAG" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --repo "$GH_REPO"
          else
            gh release create "$LATEST_TAG" "${latest_assets[@]}" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --repo "$GH_REPO"
          fi
